<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Primary SEO -->
  <title>Knotly - Smart URL Shortener</title>
  <meta name="description" content="Knotly (knot.ly) is a powerful URL shortener for 2025. Create short, custom, and trackable links in seconds. Optimize your clicks today.">
  <meta name="keywords" content="knotly, knot.ly, url shortener, link management, custom links, analytics">
  <link rel="canonical" href="https://knot-ly.vercel.app/">
  <meta name="google-site-verification" content="hf2RXMjPk9Df4y2guevoWNMmFc5FvD84qRwsjuhXfXU" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://knot-ly.vercel.app/">
  <meta property="og:title" content="Knotly - Smart URL Shortener">
  <meta property="og:description" content="Manage your links with precision. Real-time analytics and customization with knot.ly.">
  <meta property="og:image" content="https://knot-ly.vercel.app/og-image.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://knot-ly.vercel.app/">
  <meta property="twitter:title" content="Knotly - Smart URL Shortener">
  <meta property="twitter:description" content="Shorten, track, and optimize every link. The ultimate tool for digital creators.">
  <meta property="twitter:image" content="https://knot-ly.vercel.app/og-image.png">

  <!-- Schema Markup -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://knot-ly.vercel.app/#website",
        "url": "https://knot-ly.vercel.app/",
        "name": "Knotly",
        "alternateName": "knot.ly",
        "description": "High-speed URL shortening tool",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://knot-ly.vercel.app/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@type": "WebApplication",
        "name": "Knotly",
        "alternateName": ["knot.ly"],
        "url": "https://knot-ly.vercel.app/",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "All",
        "description": "URL shortener with real-time analytics and custom links.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      },
      {
        "@type": "Organization",
        "name": "Knotly",
        "url": "https://knot-ly.vercel.app/",
        "logo": "https://knot-ly.vercel.app/logo.png",
        "sameAs": [
          "https://twitter.com/knotly",
          "https://linkedin.com/company/knotly",
          "https://github.com/Sanchez042004"
        ]
      }
    ]
  }
  </script>
